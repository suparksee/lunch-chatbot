<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘 뭐 먹지? - 점심 메뉴 추천 챗봇</title>
  <style>
    :root {
      --bg: #f7f7fb;
      --card: #ffffff;
      --primary: #5b5bd6;
      --primary-dark: #4747b8;
      --text: #202124;
      --muted: #6f7280;
      --bot: #eef0ff;
      --user: #5b5bd6;
      --border: #e5e7ef;
      --shadow: 0 14px 35px rgba(33, 36, 50, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, #ececff 0, transparent 35%),
        radial-gradient(circle at bottom right, #fff1dd 0, transparent 35%),
        var(--bg);
      color: var(--text);
      font-family: Pretendard, "Noto Sans KR", -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
      padding: 20px;
    }

    .app {
      width: min(100%, 760px);
      height: min(90vh, 760px);
      min-height: 620px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 22px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.94);
    }

    .logo {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 15px;
      font-size: 25px;
      background: linear-gradient(135deg, #5b5bd6, #8888ff);
      box-shadow: 0 8px 18px rgba(91, 91, 214, 0.25);
    }

    .title-wrap h1 {
      margin: 0;
      font-size: 18px;
    }

    .title-wrap p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      display: inline-block;
      margin-right: 5px;
      border-radius: 50%;
      background: #28b463;
    }

    .reset-btn {
      margin-left: auto;
      border: 1px solid var(--border);
      background: white;
      color: var(--muted);
      border-radius: 11px;
      padding: 9px 12px;
      cursor: pointer;
      font-weight: 700;
    }

    .reset-btn:hover {
      color: var(--primary);
      border-color: #c8c8f5;
    }

    .chat {
      overflow-y: auto;
      padding: 22px;
      scroll-behavior: smooth;
      background:
        linear-gradient(rgba(255,255,255,.84), rgba(255,255,255,.84)),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 29px,
          rgba(91, 91, 214, .025) 30px
        );
    }

    .message-row {
      display: flex;
      margin-bottom: 14px;
      animation: pop .22s ease-out;
    }

    .message-row.user { justify-content: flex-end; }

    .message {
      max-width: min(82%, 530px);
      padding: 12px 15px;
      line-height: 1.55;
      border-radius: 17px;
      white-space: pre-wrap;
      word-break: keep-all;
      font-size: 15px;
    }

    .message.bot {
      background: var(--bot);
      border-bottom-left-radius: 5px;
    }

    .message.user {
      background: var(--user);
      color: white;
      border-bottom-right-radius: 5px;
    }

    .menu-card {
      margin-top: 10px;
      padding: 14px;
      background: white;
      border: 1px solid #dfe2ff;
      border-radius: 14px;
    }

    .menu-card strong {
      display: block;
      color: var(--primary-dark);
      font-size: 17px;
      margin-bottom: 4px;
    }

    .menu-meta {
      color: var(--muted);
      font-size: 13px;
      margin-top: 7px;
    }

    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 4px 0 17px 0;
    }

    .quick-replies button {
      border: 1px solid #d9daf2;
      color: #4d4fb0;
      background: #fff;
      border-radius: 999px;
      padding: 9px 12px;
      cursor: pointer;
      font-weight: 700;
      transition: .15s ease;
    }

    .quick-replies button:hover {
      transform: translateY(-1px);
      background: #f4f4ff;
      border-color: #bfc0ef;
    }

    .composer {
      padding: 15px;
      border-top: 1px solid var(--border);
      background: white;
    }

    .input-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 7px 7px 15px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #fafaff;
    }

    input {
      flex: 1;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      font-size: 15px;
      color: var(--text);
    }

    .send-btn {
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 13px;
      background: var(--primary);
      color: white;
      cursor: pointer;
      font-size: 18px;
      font-weight: 800;
    }

    .send-btn:hover { background: var(--primary-dark); }

    .hint {
      margin: 9px 3px 0;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    @keyframes pop {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      body { padding: 0; }
      .app {
        width: 100%;
        height: 100vh;
        min-height: 100vh;
        border: 0;
        border-radius: 0;
      }
      header { padding: 16px; }
      .chat { padding: 17px 14px; }
      .message { max-width: 88%; }
      .title-wrap p { display: none; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="logo" aria-hidden="true">🍱</div>
      <div class="title-wrap">
        <h1>오늘 뭐 먹지?</h1>
        <p><span class="status-dot"></span>취향에 맞춰 점심을 골라드려요</p>
      </div>
      <button class="reset-btn" id="resetBtn" type="button">처음부터</button>
    </header>

    <section class="chat" id="chat" aria-live="polite"></section>

    <footer class="composer">
      <form class="input-wrap" id="chatForm">
        <input
          id="userInput"
          type="text"
          autocomplete="off"
          placeholder="예: 1만 원 이하, 매콤한 한식 추천해줘"
          aria-label="메시지 입력"
        />
        <button class="send-btn" type="submit" aria-label="전송">➜</button>
      </form>
      <div class="hint">“아무거나”, “다른 메뉴”, “가볍게”, “채식”처럼 입력해 보세요.</div>
    </footer>
  </main>

  <script>
    const menus = [
      { name: "김치찌개", category: "한식", price: 9000, spicy: 3, heavy: 3, tags: ["따뜻한", "국물", "든든한"], vegetarian: false, desc: "칼칼한 국물에 밥 한 공기가 잘 어울리는 대표 점심 메뉴" },
      { name: "된장찌개", category: "한식", price: 8500, spicy: 1, heavy: 3, tags: ["따뜻한", "국물", "집밥"], vegetarian: true, desc: "구수하고 편안한 맛을 원할 때 좋은 집밥 스타일 메뉴" },
      { name: "제육볶음", category: "한식", price: 10000, spicy: 3, heavy: 4, tags: ["매콤한", "든든한", "고기"], vegetarian: false, desc: "매콤달콤한 양념과 불향으로 확실한 만족감을 주는 메뉴" },
      { name: "비빔밥", category: "한식", price: 9500, spicy: 2, heavy: 2, tags: ["채소", "균형", "가벼운"], vegetarian: true, desc: "여러 채소를 한 번에 먹을 수 있는 균형 잡힌 한 그릇" },
      { name: "순두부찌개", category: "한식", price: 9000, spicy: 3, heavy: 3, tags: ["따뜻한", "국물", "부드러운"], vegetarian: true, desc: "부드러운 순두부와 얼큰한 국물의 조합" },
      { name: "돈가스", category: "일식", price: 11000, spicy: 0, heavy: 4, tags: ["바삭한", "든든한", "고기"], vegetarian: false, desc: "바삭한 튀김옷과 부드러운 고기로 실패 확률이 낮은 선택" },
      { name: "초밥", category: "일식", price: 14000, spicy: 0, heavy: 2, tags: ["깔끔한", "해산물", "가벼운"], vegetarian: false, desc: "기름지지 않고 깔끔하게 먹기 좋은 메뉴" },
      { name: "우동", category: "일식", price: 8500, spicy: 0, heavy: 2, tags: ["따뜻한", "국물", "면"], vegetarian: true, desc: "부드러운 면과 따뜻한 국물로 편안하게 즐기는 메뉴" },
      { name: "카레라이스", category: "일식", price: 9000, spicy: 1, heavy: 3, tags: ["향긋한", "든든한", "밥"], vegetarian: true, desc: "진한 소스와 밥을 함께 먹는 무난하고 든든한 선택" },
      { name: "마라탕", category: "중식", price: 12000, spicy: 4, heavy: 3, tags: ["얼얼한", "매콤한", "국물"], vegetarian: true, desc: "재료를 골라 먹는 재미와 얼얼한 매운맛이 특징" },
      { name: "짜장면", category: "중식", price: 8000, spicy: 0, heavy: 3, tags: ["달콤한", "면", "가성비"], vegetarian: false, desc: "달큰하고 진한 소스로 빠르고 편하게 먹기 좋은 메뉴" },
      { name: "짬뽕", category: "중식", price: 9500, spicy: 4, heavy: 3, tags: ["매콤한", "해산물", "국물"], vegetarian: false, desc: "불향과 얼큰한 해물 국물이 당길 때 좋은 선택" },
      { name: "쌀국수", category: "아시안", price: 11000, spicy: 1, heavy: 2, tags: ["국물", "깔끔한", "면"], vegetarian: true, desc: "향긋한 국물과 부드러운 면으로 부담 없이 즐기는 메뉴" },
      { name: "팟타이", category: "아시안", price: 12000, spicy: 2, heavy: 3, tags: ["새콤달콤", "면", "이국적인"], vegetarian: true, desc: "새콤달콤한 소스와 쫄깃한 면이 매력적인 메뉴" },
      { name: "분짜", category: "아시안", price: 13000, spicy: 1, heavy: 2, tags: ["상큼한", "고기", "가벼운"], vegetarian: false, desc: "구운 고기와 채소를 새콤한 소스에 곁들이는 메뉴" },
      { name: "파스타", category: "양식", price: 14000, spicy: 1, heavy: 3, tags: ["면", "분위기", "든든한"], vegetarian: true, desc: "소스 선택이 다양하고 여유로운 점심에 잘 어울리는 메뉴" },
      { name: "리조또", category: "양식", price: 14500, spicy: 1, heavy: 4, tags: ["크리미한", "밥", "든든한"], vegetarian: true, desc: "부드럽고 진한 맛을 천천히 즐기기 좋은 메뉴" },
      { name: "햄버거", category: "패스트푸드", price: 9000, spicy: 1, heavy: 4, tags: ["빠른", "고기", "든든한"], vegetarian: false, desc: "시간이 부족할 때 빠르게 먹고 만족하기 좋은 메뉴" },
      { name: "샌드위치", category: "가벼운식사", price: 8500, spicy: 0, heavy: 1, tags: ["가벼운", "빠른", "채소"], vegetarian: true, desc: "오후 일정이 무겁지 않도록 산뜻하게 먹는 선택" },
      { name: "포케", category: "가벼운식사", price: 12500, spicy: 0, heavy: 1, tags: ["건강한", "채소", "가벼운"], vegetarian: true, desc: "채소와 단백질을 취향대로 조합할 수 있는 건강한 한 그릇" },
      { name: "샐러드", category: "가벼운식사", price: 10000, spicy: 0, heavy: 1, tags: ["건강한", "채소", "가벼운"], vegetarian: true, desc: "깔끔하고 산뜻하게 먹고 싶은 날의 대표 메뉴" },
      { name: "칼국수", category: "한식", price: 9000, spicy: 1, heavy: 3, tags: ["따뜻한", "국물", "면"], vegetarian: true, desc: "따뜻하고 걸쭉한 국물과 쫄깃한 면이 포근한 메뉴" },
      { name: "냉면", category: "한식", price: 11000, spicy: 1, heavy: 2, tags: ["시원한", "면", "깔끔한"], vegetarian: true, desc: "더운 날 시원하고 깔끔하게 먹기 좋은 메뉴" },
      { name: "삼계탕", category: "한식", price: 16000, spicy: 0, heavy: 5, tags: ["보양식", "따뜻한", "든든한"], vegetarian: false, desc: "기운을 보충하고 싶은 날 선택하는 든든한 보양식" }
    ];

    const state = {
      budget: null,
      category: null,
      spicy: null,
      heavy: null,
      vegetarian: false,
      excluded: [],
      lastMenus: []
    };

    const chat = document.getElementById("chat");
    const form = document.getElementById("chatForm");
    const input = document.getElementById("userInput");
    const resetBtn = document.getElementById("resetBtn");

    const quickSets = {
      first: ["🍚 한식", "🍜 면요리", "🌶️ 매콤하게", "🥗 가볍게", "🎲 아무거나"],
      refine: ["💸 1만 원 이하", "🌱 채식", "🍲 국물", "✨ 다른 메뉴", "🔄 조건 초기화"]
    };

    function escapeHtml(text) {
      return text.replace(/[&<>"']/g, ch => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
      }[ch]));
    }

    function addMessage(text, sender = "bot", html = false) {
      const row = document.createElement("div");
      row.className = `message-row ${sender}`;

      const bubble = document.createElement("div");
      bubble.className = `message ${sender}`;
      if (html) bubble.innerHTML = text;
      else bubble.textContent = text;

      row.appendChild(bubble);
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
    }

    function showQuickReplies(items) {
      const wrap = document.createElement("div");
      wrap.className = "quick-replies";
      items.forEach(label => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = label;
        button.addEventListener("click", () => {
          const clean = label.replace(/^[^\p{L}\p{N}]+/u, "").trim();
          handleUserMessage(clean);
          wrap.remove();
        });
        wrap.appendChild(button);
      });
      chat.appendChild(wrap);
      chat.scrollTop = chat.scrollHeight;
    }

    function parseBudget(text) {
      const tenThousand = text.match(/(\d+(?:\.\d+)?)\s*만\s*원?/);
      if (tenThousand) return Math.round(parseFloat(tenThousand[1]) * 10000);

      const won = text.match(/(\d{4,5})\s*원?/);
      if (won) return parseInt(won[1], 10);

      if (/만원\s*(이하|안|내)/.test(text) || /1만\s*(이하|안|내)/.test(text)) return 10000;
      if (/저렴|가성비|싸게/.test(text)) return 9000;
      return null;
    }

    function updatePreferences(text) {
      const t = text.toLowerCase();
      const budget = parseBudget(t);
      if (budget) state.budget = budget;

      if (/한식|집밥/.test(t)) state.category = "한식";
      else if (/일식|돈가스|초밥|우동|카레/.test(t)) state.category = "일식";
      else if (/중식|짜장|짬뽕|마라/.test(t)) state.category = "중식";
      else if (/양식|파스타|리조또/.test(t)) state.category = "양식";
      else if (/아시안|베트남|태국|쌀국수|팟타이|분짜/.test(t)) state.category = "아시안";
      else if (/패스트푸드|햄버거/.test(t)) state.category = "패스트푸드";
      else if (/샐러드|포케|샌드위치|가벼운\s*식사/.test(t)) state.category = "가벼운식사";
      else if (/면|국수/.test(t)) state.category = "면요리";

      if (/아주\s*맵|매운맛|얼얼|마라|불닭/.test(t)) state.spicy = 4;
      else if (/매콤|칼칼|얼큰/.test(t)) state.spicy = 3;
      else if (/안\s*맵|맵지\s*않|순한|담백/.test(t)) state.spicy = 0;

      if (/가볍|산뜻|부담\s*없|다이어트|건강/.test(t)) state.heavy = 1;
      else if (/든든|배부르게|푸짐|보양/.test(t)) state.heavy = 4;

      if (/채식|비건|고기\s*없이/.test(t)) state.vegetarian = true;
      if (/채식\s*아니|고기\s*좋|고기\s*먹/.test(t)) state.vegetarian = false;

      if (/국물/.test(t)) state.tag = "국물";
      else if (/시원/.test(t)) state.tag = "시원한";
      else if (/따뜻/.test(t)) state.tag = "따뜻한";
      else if (/바삭/.test(t)) state.tag = "바삭한";
      else if (/해산물/.test(t)) state.tag = "해산물";
    }

    function scoreMenu(menu) {
      let score = Math.random() * 1.7;

      if (state.budget !== null) {
        score += menu.price <= state.budget ? 4 : -8;
        score += Math.max(0, 1.5 - Math.abs(state.budget - menu.price) / 6000);
      }

      if (state.category) {
        if (state.category === "면요리") {
          score += (menu.tags.includes("면") || /면|국수|우동|파스타|쌀국수|냉면|칼국수/.test(menu.name)) ? 5 : -1;
        } else {
          score += menu.category === state.category ? 5 : -1.5;
        }
      }

      if (state.spicy !== null) {
        score += 4 - Math.abs(menu.spicy - state.spicy) * 1.3;
      }

      if (state.heavy !== null) {
        score += 3 - Math.abs(menu.heavy - state.heavy);
      }

      if (state.vegetarian) score += menu.vegetarian ? 5 : -20;
      if (state.tag) score += menu.tags.includes(state.tag) ? 4 : 0;
      if (state.excluded.includes(menu.name)) score -= 20;

      return score;
    }

    function recommend(count = 5) {
      let candidates = menus.filter(menu => !state.excluded.includes(menu.name));

      // 추천 가능한 새 메뉴가 부족해지면 제외 목록을 비우고 다시 추천합니다.
      if (candidates.length < count) {
        state.excluded = [];
        candidates = [...menus];
      }

      const selected = candidates
        .map(menu => ({ menu, score: scoreMenu(menu) }))
        .sort((a, b) => b.score - a.score)
        .slice(0, count)
        .map(item => item.menu);

      state.lastMenus = selected;
      return selected;
    }

    function preferenceSummary() {
      const parts = [];
      if (state.budget) parts.push(`${state.budget.toLocaleString()}원 이하`);
      if (state.category) parts.push(state.category === "면요리" ? "면요리" : state.category);
      if (state.spicy === 4) parts.push("아주 매운맛");
      else if (state.spicy === 3) parts.push("매콤한 맛");
      else if (state.spicy === 0) parts.push("안 매운맛");
      if (state.heavy === 1) parts.push("가볍게");
      else if (state.heavy === 4) parts.push("든든하게");
      if (state.vegetarian) parts.push("채식");
      if (state.tag) parts.push(state.tag);
      return parts.length ? parts.join(" · ") : "특별한 조건 없음";
    }

    function renderRecommendation(recommendedMenus) {
      const cards = recommendedMenus.map((menu, index) => {
        const spicyText = ["안 매움", "순한 맛", "약간 매콤", "매콤함", "아주 매움"][menu.spicy];
        return `
          <div class="menu-card">
            <strong>${index + 1}. ${escapeHtml(menu.name)}</strong>
            <div>${escapeHtml(menu.desc)}</div>
            <div class="menu-meta">
              ${escapeHtml(menu.category)} · 약 ${menu.price.toLocaleString()}원 · ${spicyText}
            </div>
          </div>
        `;
      }).join("");

      const html = `
        조건에 잘 맞는 점심 메뉴 5가지를 골라봤어요!
        ${cards}
        <div class="menu-meta">반영한 조건: ${escapeHtml(preferenceSummary())}</div>
      `;
      addMessage(html, "bot", true);
      showQuickReplies(quickSets.refine);
    }

    function resetState(showGreeting = true) {
      state.budget = null;
      state.category = null;
      state.spicy = null;
      state.heavy = null;
      state.vegetarian = false;
      state.excluded = [];
      state.lastMenus = [];
      state.tag = null;
      chat.innerHTML = "";

      if (showGreeting) {
        addMessage("안녕하세요! 오늘 점심 메뉴를 같이 골라볼게요.\n먹고 싶은 느낌이나 예산을 편하게 말해 주세요.");
        showQuickReplies(quickSets.first);
      }
    }

    function handleUserMessage(rawText) {
      const text = rawText.trim();
      if (!text) return;

      addMessage(text, "user");
      input.value = "";

      if (/^(처음부터|초기화|조건 초기화|리셋)/.test(text)) {
        resetState(false);
        addMessage("조건을 모두 초기화했어요. 다시 골라볼까요?");
        showQuickReplies(quickSets.first);
        return;
      }

      if (/다른|또 추천|다시 추천|별로/.test(text)) {
        state.lastMenus.forEach(menu => {
          if (!state.excluded.includes(menu.name)) {
            state.excluded.push(menu.name);
          }
        });
        renderRecommendation(recommend(5));
        return;
      }

      if (/아무거나|랜덤|골라줘|추천해줘|뭐 먹|메뉴 추천/.test(text)) {
        updatePreferences(text);
        renderRecommendation(recommend(5));
        return;
      }

      updatePreferences(text);

      const onlyPreference =
        /^(한식|일식|중식|양식|아시안|면요리|면|매콤하게|가볍게|든든하게|채식|국물|시원하게|1만 원 이하|만원 이하)$/.test(text);

      if (onlyPreference) {
        renderRecommendation(recommend(5));
        return;
      }

      if (/고마|좋아|오케이|먹을게/.test(text)) {
        addMessage(state.lastMenus.length
          ? "좋아요! 추천 메뉴 중 마음에 드는 걸로 맛있는 점심 드세요 😋"
          : "맛있는 점심 드세요 😋");
        return;
      }

      renderRecommendation(recommend(5));
    }

    form.addEventListener("submit", event => {
      event.preventDefault();
      handleUserMessage(input.value);
    });

    resetBtn.addEventListener("click", () => resetState(true));

    resetState(true);
  </script>
</body>
</html>
